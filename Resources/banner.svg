<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="40%" stop-color="#2D2A6E"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5856D6"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C7C6FF"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="0.35" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5856D6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1E1B4B" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <clipPath id="iphoneScreen">
      <rect x="978" y="170" width="86" height="160" rx="6"/>
    </clipPath>
    <clipPath id="ipadScreen">
      <rect x="1098" y="148" width="140" height="200" rx="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  <rect width="1280" height="640" fill="url(#glowBg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Decorative circuit lines -->
  <g stroke="#5856D6" stroke-opacity="0.15" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M 60 320 L 120 320 L 120 260 L 180 260"/>
    <path d="M 60 400 L 100 400 L 100 460 L 160 460"/>
    <circle cx="180" cy="260" r="4" fill="#5856D6" fill-opacity="0.2" stroke="none"/>
    <circle cx="160" cy="460" r="4" fill="#5856D6" fill-opacity="0.2" stroke="none"/>
    <circle cx="60" cy="320" r="3" fill="#5856D6" fill-opacity="0.3" stroke="none"/>
    <circle cx="60" cy="400" r="3" fill="#5856D6" fill-opacity="0.3" stroke="none"/>
  </g>

  <!-- App icon (small version) -->
  <g transform="translate(100, 230)">
    <!-- Icon background -->
    <rect width="180" height="180" rx="40" fill="url(#accentGrad)"/>
    <!-- Beacon rays -->
    <g stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2" stroke-linecap="round">
      <line x1="90" y1="38" x2="90" y2="18"/>
      <line x1="90" y1="38" x2="70" y2="22"/>
      <line x1="90" y1="38" x2="110" y2="22"/>
    </g>
    <!-- Glow dot -->
    <circle cx="90" cy="38" r="6" fill="#FFFFFF" fill-opacity="0.5"/>
    <!-- P letter -->
    <g fill="url(#iconGrad)">
      <rect x="55" y="42" width="18" height="120" rx="9"/>
      <path d="M 64 42 L 105 42 C 140 42 140 100 105 100 L 64 100 L 64 82 L 100 82 C 115 82 115 60 100 60 L 64 60 Z"/>
    </g>
    <!-- Inner glow dot -->
    <circle cx="100" cy="71" r="6" fill="#FFFFFF" fill-opacity="0.3"/>
  </g>

  <!-- "Phosphor" title -->
  <text x="320" y="310" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="84" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Phosphor</text>

  <!-- Tagline -->
  <text x="324" y="360" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="24" font-weight="400" fill="#A5B4FC" letter-spacing="0.5">Free &amp; Open-Source iOS Device Manager for macOS</text>

  <!-- Accent line under tagline -->
  <rect x="324" y="380" width="120" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="14" font-weight="500">
    <g>
      <rect x="324" y="410" width="100" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
      <text x="374" y="431" fill="#C7D2FE" text-anchor="middle">File Manager</text>
    </g>
    <g>
      <rect x="440" y="410" width="80" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
      <text x="480" y="431" fill="#C7D2FE" text-anchor="middle">Backup</text>
    </g>
    <g>
      <rect x="536" y="410" width="100" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
      <text x="586" y="431" fill="#C7D2FE" text-anchor="middle">Diagnostics</text>
    </g>
    <g>
      <rect x="652" y="410" width="100" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
      <text x="702" y="431" fill="#C7D2FE" text-anchor="middle">App Install</text>
    </g>
  </g>

  <!-- iPhone silhouette -->
  <g opacity="0.5">
    <!-- iPhone body -->
    <rect x="970" y="150" width="102" height="200" rx="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2"/>
    <!-- Screen area -->
    <rect x="978" y="170" width="86" height="160" rx="6" fill="#FFFFFF" fill-opacity="0.04"/>
    <!-- Dynamic Island -->
    <rect x="1001" y="156" width="40" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.1"/>
    <!-- Screen content lines -->
    <g clip-path="url(#iphoneScreen)">
      <rect x="988" y="185" width="50" height="6" rx="3" fill="#5856D6" fill-opacity="0.3"/>
      <rect x="988" y="200" width="66" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.08"/>
      <rect x="988" y="212" width="58" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.06"/>
      <rect x="988" y="230" width="66" height="40" rx="6" fill="#5856D6" fill-opacity="0.12"/>
      <rect x="988" y="280" width="66" height="40" rx="6" fill="#FFFFFF" fill-opacity="0.05"/>
    </g>
  </g>

  <!-- iPad silhouette -->
  <g opacity="0.35">
    <!-- iPad body -->
    <rect x="1088" y="135" width="160" height="225" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2"/>
    <!-- Screen area -->
    <rect x="1098" y="148" width="140" height="200" rx="6" fill="#FFFFFF" fill-opacity="0.03"/>
    <!-- Camera dot -->
    <circle cx="1168" cy="141" r="3" fill="#FFFFFF" fill-opacity="0.1"/>
    <!-- Screen content -->
    <g clip-path="url(#ipadScreen)">
      <rect x="1108" y="162" width="70" height="6" rx="3" fill="#5856D6" fill-opacity="0.25"/>
      <rect x="1108" y="178" width="120" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.06"/>
      <rect x="1108" y="195" width="55" height="55" rx="8" fill="#5856D6" fill-opacity="0.1"/>
      <rect x="1173" y="195" width="55" height="55" rx="8" fill="#FFFFFF" fill-opacity="0.04"/>
      <rect x="1108" y="260" width="55" height="55" rx="8" fill="#FFFFFF" fill-opacity="0.04"/>
      <rect x="1173" y="260" width="55" height="55" rx="8" fill="#5856D6" fill-opacity="0.08"/>
    </g>
  </g>

  <!-- Connection line between icon and devices -->
  <g stroke="#5856D6" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="4 4">
    <line x1="280" y1="320" x2="970" y2="250"/>
  </g>

  <!-- Bottom text -->
  <text x="640" y="580" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="16" font-weight="400" fill="#6366F1" fill-opacity="0.5" text-anchor="middle" letter-spacing="3">NATIVE SWIFT - OPEN SOURCE - macOS</text>
</svg>